# Traefik → npanel-caddy:8080.
# npanel-caddy serves NIP-05 at /.well-known/nostr.json and proxies everything else to nsite-gateway with canonical Host rewrite.
services:
  nsite-gateway:
    image: ghcr.io/hzrd149/nsite-gateway:master
    restart: unless-stopped
    environment:
      PUBLIC_DOMAIN: ${NSITE_ROUTER_HOST}
      CACHE_PATH: /cache/nsite.kv
      NOSTR_RELAYS: ${NOSTR_RELAYS}
      LOOKUP_RELAYS: ${LOOKUP_RELAYS}
      BLOSSOM_SERVERS: ${BLOSSOM_SERVERS}
    volumes:
      - nsite_gateway_cache_{{DEPLOY_SUFFIX}}:/cache
    expose:
      - "3000"
    networks:
      - dokploy-network

  npanel-nip05:
    image: python:3.12-alpine
    restart: unless-stopped
    environment:
      NPANEL_NIP05_USERS: ${NPANEL_NIP05_USERS}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /srv/.well-known &&
        python - <<'PY'
        import json
        import os
        import re

        raw = os.environ.get("NPANEL_NIP05_USERS", "")
        tokens = [part.strip() for part in raw.replace("\n", ",").split(",") if part.strip()]
        names = {}
        for token in tokens:
          if "=" not in token:
            raise SystemExit(f"Invalid NPANEL_NIP05_USERS token: {token} (expected name=hex)")
          name, pubkey = token.split("=", 1)
          name = name.strip().lower()
          pubkey = pubkey.strip().lower()
          if not re.fullmatch(r"[a-z0-9_]+", name):
            raise SystemExit(f"Invalid NIP-05 username: {name}")
          if not re.fullmatch(r"[0-9a-f]{64}", pubkey):
            raise SystemExit(f"Invalid NIP-05 pubkey for {name}: expected 64-char hex")
          names[name] = pubkey
        with open("/srv/.well-known/nostr.json", "w", encoding="utf-8") as f:
          json.dump({"names": names}, f, separators=(",", ":"))
        
        # CORS-enabled HTTP server for browser NIP-05 checkers
        cat > /tmp/cors_server.py << 'SERVER_PY'
        import http.server
        import socketserver
        import os
        
        class CORSHTTPRequestHandler(http.server.SimpleHTTPRequestHandler):
            def end_headers(self):
                self.send_header('Access-Control-Allow-Origin', '*')
                self.send_header('Access-Control-Allow-Methods', 'GET, POST, OPTIONS')
                self.send_header('Access-Control-Allow-Headers', 'Content-Type')
                super().end_headers()
        
        os.chdir('/srv')
        with socketserver.TCPServer(("", 8090), CORSHTTPRequestHandler) as httpd:
            httpd.serve_forever()
        SERVER_PY
        exec python /tmp/cors_server.py
    expose:
      - "8090"
    networks:
      - dokploy-network

  npanel-caddy:
    image: caddy:alpine
    restart: unless-stopped
    environment:
      CANONICAL_HOST: ${NSITE_DOMAIN}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        printf ':8080 {\n  @nip05 path /.well-known/nostr.json\n  handle @nip05 {\n    reverse_proxy http://npanel-nip05:8090\n  }\n  handle {\n    reverse_proxy http://nsite-gateway:3000 {\n      header_up Host %s\n    }\n  }\n}\n' "$$CANONICAL_HOST" > /tmp/Caddyfile && exec caddy run --config /tmp/Caddyfile
    expose:
      - "8080"
    depends_on:
      - nsite-gateway
      - npanel-nip05
    networks:
      - dokploy-network

volumes:
  nsite_gateway_cache_{{DEPLOY_SUFFIX}}:

networks:
  dokploy-network:
    external: true
