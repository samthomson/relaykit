# Usage:
# Dev:  docker compose --profile dev up -d
# Prod: docker compose --profile prod up -d
services:
  # Common services (always included)
  dokploy-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dokploy
      POSTGRES_PASSWORD: dokploy_secret
      POSTGRES_DB: dokploy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dokploy"]
      interval: 5s
      timeout: 5s
      retries: 5

  dokploy-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  dokploy:
    image: dokploy/dokploy:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://dokploy:dokploy_secret@dokploy-postgres:5432/dokploy
      - REDIS_URL=redis://dokploy-redis:6379
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dokploy_data:/etc/dokploy
    networks:
      - default
      - dokploy-network
    depends_on:
      dokploy-postgres:
        condition: service_healthy
      dokploy-redis:
        condition: service_healthy

  # Traefik - different config per environment
  dokploy-traefik-dev:
    profiles: ["dev"]
    image: traefik:v3.6.7
    restart: unless-stopped
    volumes:
      - dokploy_data:/etc/dokploy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: --configFile=/etc/dokploy/traefik/traefik.yml
    depends_on:
      - dokploy
    networks:
      - default
      - dokploy-network

  dokploy-traefik-prod:
    profiles: ["prod"]
    image: traefik:v3.6.7
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - dokploy_data:/etc/dokploy
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: --configFile=/etc/dokploy/traefik/traefik.yml
    depends_on:
      - dokploy
    networks:
      - default
      - dokploy-network

  # Caddy - dev only (HTTPS termination with local certs)
  caddy:
    profiles: ["dev"]
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dev-certs:/certs:ro
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
    depends_on:
      - dokploy-traefik-dev
    networks:
      - default

  # RelayKit - different config per environment
  relaykit-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./app:/app
      - relaykit_data:/app/.relaykit
    depends_on:
      dokploy:
        condition: service_started

  relaykit-prod:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - relaykit_data:/app/.relaykit
    depends_on:
      dokploy:
        condition: service_started
    command: ["sh", "-c", "cd /app/frontend && yarn build && cd /app/backend && yarn start"]

volumes:
  postgres_data:
  redis_data:
  dokploy_data:
  relaykit_data:

networks:
  dokploy-network:
    name: dokploy-network
    driver: bridge
